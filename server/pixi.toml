[workspace]
name = "millfolio-server"
version = "0.0.1"
authors = ["Marius S <marius@seritan.net>"]
description = "Millfolio app backend — HTTP server over the privacy_box vault orchestrator."
# Same org nightly as privacy_box/flare/json/jinja2.mojo, so the cross-repo `-I`
# includes resolve against one toolchain.
channels = [
    "https://conda.modular.com/max-nightly",
    "conda-forge",
]
platforms = ["osx-arm64"]

[dependencies]
mojo = "==1.0.0b3.dev2026062706"
# flare's runtime deps — needed to build flare's FFI shims into this env (the
# `flare-ffi` task) so flare's HTTP/TLS client works when consumed via -I flare.
openssl          = ">=3.6.1,<4"
ca-certificates  = ">=2025.1.31"
zlib             = ">=1.3.1,<2"
libbrotlicommon  = ">=1,<2"
libbrotlidec     = ">=1,<2"
libbrotlienc     = ">=1,<2"

[tasks]
# Build flare's FFI shims into THIS env's $CONDA_PREFIX/lib so flare's HTTP/TLS
# client works when linked via -I flare. Repos are laid out as siblings of the
# `app/` checkout, so flare is two levels up (app/server/../../flare). Mirrors
# privacy_box's `flare-ffi` task.
flare-ffi = "bash -c 'source ../../flare/flare/tls/ffi/build.sh; source ../../flare/flare/http/ffi/build.sh'"

# Compile the server. Serves BOTH the unary HTTP API and the streaming WebSocket
# chat on one :10000 listener (flare's serve(handler, ws_handler)). `-I src`
# resolves the sibling events.mojo (WS event serialization); imports the privacy_box
# orchestrator (wiring/orchestrator/settings/vaultcfg) via -I ../../vault/privacy-box/src,
# plus flare/json/jinja2. `-I ../../vault/core/src` pulls vault.derive.store (the
# LanceDB-free registry/tags/retag store — same functions the `millfolio` CLI uses,
# so /api/tags + category edits run IN-PROCESS, no spawning the engine binary). The
# vault gen program's extra shims (zlib/lancedb) are NOT needed here: it's compiled +
# run as a separate subprocess at request time.
build = { cmd = "mkdir -p build && mojo build src/server.mojo -I src -I ../../vault/privacy-box/src -I ../../vault/core/src -I ../../flare -I ../../json -I ../../jinja2.mojo/src -I ../../logging.mojo/src -o build/millfolio-server", depends-on = ["flare-ffi"] }

# Unit-test the protocol wire helpers (events.mojo) — no flare/privacy_box, only json.
test = { cmd = "mkdir -p build && mojo build test/events_test.mojo -I src -I ../../json -o build/events-test && ./build/events-test" }
# Unit-test the serial run-queue state file (runqueue.mojo) — flock + ticket invariants.
test-runqueue = { cmd = "mkdir -p build && mojo build test/runqueue_test.mojo -I src -I ../../flare -o build/runqueue-test && rm -f /tmp/millfolio-runq-test /tmp/millfolio-runq-test.lock && MILLFOLIO_RUNQ_PATH=/tmp/millfolio-runq-test ./build/runqueue-test" }
# Unit-test the on-device JSON store builders (store.mojo) — ask history + /api/system.
test-store = { cmd = "mkdir -p build && mojo build test/store_test.mojo -I src -I ../../json -o build/store-test && ./build/store-test" }
# Full unit suite — what `moon run app-server:check` runs (events + run-queue + store).
test-all = { depends-on = ["test", "test-runqueue", "test-store"] }
