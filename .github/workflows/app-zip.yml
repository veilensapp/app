name: app zip

# Builds + packages veilens-app.zip (ws_server source + the built web UI) the CLI
# downloads and builds/serves on-device. Compiles veilens-server + veilens-ws as a
# gate, builds the web app, then packages. Attaches to a Release on tags. Modeled
# on headgate's headgate-zip.yml.
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths: ["server/**", "web/**", "scripts/package-app.sh", ".github/workflows/app-zip.yml"]
  pull_request:
    paths: ["server/**", "web/**", "scripts/package-app.sh", ".github/workflows/app-zip.yml"]
  workflow_dispatch:

permissions:
  contents: write # to attach the zip to a Release on tags

jobs:
  zip:
    runs-on: macos-14
    steps:
      # Sibling layout: app/ alongside headgate/ flare/ json/ jinja2.mojo/.
      - uses: actions/checkout@v4
        with:
          path: app
      - uses: actions/checkout@v4
        with:
          repository: veilensapp/headgate
          path: headgate
      - uses: actions/checkout@v4
        with:
          repository: millrace/flare
          path: flare
      - uses: actions/checkout@v4
        with:
          repository: millrace/json
          path: json
      - uses: actions/checkout@v4
        with:
          repository: millrace/jinja2.mojo
          path: jinja2.mojo

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          manifest-path: app/server/pixi.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build veilens-server + veilens-ws (compile gate)
        working-directory: app/server
        run: |
          pixi run build
          pixi run build-ws

      - name: Build web UI
        working-directory: app/web
        run: |
          npm ci
          npm run build

      - name: Package veilens-app.zip
        working-directory: app
        run: bash scripts/package-app.sh "$GITHUB_WORKSPACE/veilens-app.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: veilens-app-zip
          path: veilens-app.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: veilens-app.zip
